; Skyrim SE Head Tracking Configuration
; Delete this file to reset to defaults

[Network]
; UDP port for OpenTrack data (default: 4242)
UDPPort=4242

[Sensitivity]
; Rotation sensitivity multipliers (1.0 = 1:1)
YawMultiplier=1.0
PitchMultiplier=1.0
RollMultiplier=1.0
; Rotation smoothing (0.0 = snappy, internal 0.15 floor still applied;
; raise toward 1.0 for noisier trackers - costs perceived latency)
RotationSmoothing=0.0

[Position]
; Position tracking sensitivity (0.1-10.0, higher = more movement)
SensitivityX=1.0
SensitivityY=1.0
SensitivityZ=1.0
; Position limits in meters (how far the camera can move)
LimitX=0.30
LimitY=0.20
LimitZ=0.40
; Backward lean limit (prevents camera clipping through player model)
LimitZBack=0.10
; Smoothing factor (0.0 = none, 0.99 = maximum)
Smoothing=0.15
; Invert position axes
InvertX=true
InvertY=false
InvertZ=true
; Enable/disable position tracking (6DOF)
Enabled=true

[Hotkeys]
; Virtual key codes (hex)
ToggleKey=0x23    ; End - Enable/disable head tracking
RecenterKey=0x24  ; Home - Recenter view
PositionToggleKey=0x21 ; Page Up - Toggle position tracking
YawModeKey=0x22   ; Page Down - Toggle world/local yaw

[General]
; Auto-enable tracking on game start
AutoEnable=true
; Show on-screen notifications (logged to HeadTracking.log)
ShowNotifications=true
; Yaw mode: true = horizon-locked (default), false = camera-local
WorldSpaceYaw=true
