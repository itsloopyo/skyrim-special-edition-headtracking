name: Build

on:
  push:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

jobs:
  build:
    name: Build and Validate
    runs-on: windows-latest
    if: ${{ !startsWith(github.event.head_commit.message, 'Release v') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Configure CMake
        shell: pwsh
        run: |
          Write-Host "Configuring CMake (Visual Studio 2022, x64)..." -ForegroundColor Cyan
          cmake -B build -G "Visual Studio 17 2022" -A x64

          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::CMake configure failed"
            exit 1
          }

          Write-Host "CMake configured successfully" -ForegroundColor Green

      - name: Build Debug
        shell: pwsh
        run: |
          Write-Host "Building debug configuration..." -ForegroundColor Cyan
          cmake --build build --config Debug

          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Debug build failed"
            exit 1
          }

          Write-Host "Debug build succeeded" -ForegroundColor Green

      - name: Build Release
        shell: pwsh
        run: |
          Write-Host "Building release configuration..." -ForegroundColor Cyan
          cmake --build build --config Release

          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Release build failed"
            exit 1
          }

          Write-Host "Release build succeeded" -ForegroundColor Green

      - name: Verify build outputs
        shell: pwsh
        run: |
          Write-Host "Verifying build outputs..." -ForegroundColor Cyan

          $requiredFiles = @(
            "bin/Debug/SkyrimSEHeadTracking.asi",
            "bin/Release/SkyrimSEHeadTracking.asi"
          )

          $allExist = $true
          foreach ($file in $requiredFiles) {
            if (Test-Path $file) {
              $size = (Get-Item $file).Length / 1KB
              Write-Host "  $file ($([math]::Round($size, 2)) KB)" -ForegroundColor Green
            } else {
              Write-Host "  Missing: $file" -ForegroundColor Red
              $allExist = $false
            }
          }

          if (-not $allExist) {
            Write-Host "::error::Some build outputs are missing"
            exit 1
          }

          Write-Host "All build outputs verified" -ForegroundColor Green

      - name: Package installer
        shell: pwsh
        run: |
          Write-Host "Packaging installer ZIP..." -ForegroundColor Cyan
          powershell -ExecutionPolicy Bypass -File scripts/package-release.ps1

          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Packaging failed"
            exit 1
          }

          Write-Host "Package created" -ForegroundColor Green

      - name: Stage installer contents for artifact upload
        shell: pwsh
        run: |
          $installerZip = Get-ChildItem release/*-installer.zip | Select-Object -First 1
          if (-not $installerZip) {
            Write-Host "::error::No installer ZIP found in release/"
            exit 1
          }

          $stageDir = "release/artifact-contents"
          if (Test-Path $stageDir) { Remove-Item -Recurse -Force $stageDir }
          New-Item -ItemType Directory -Path $stageDir -Force | Out-Null

          Expand-Archive -Path $installerZip.FullName -DestinationPath $stageDir -Force
          Write-Host "Staged $($installerZip.Name) contents to $stageDir" -ForegroundColor Green

      - name: Compute artifact name from ref
        id: artifact
        shell: pwsh
        run: |
          $branch = "${{ github.ref_name }}"
          $sanitized = $branch -replace '[^A-Za-z0-9._-]', '-'
          $name = "SkyrimSEHeadTracking-$sanitized"
          Write-Host "Artifact name: $name" -ForegroundColor Green
          "name=$name" >> $env:GITHUB_OUTPUT

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: release/artifact-contents/
          retention-days: 14
          if-no-files-found: error
